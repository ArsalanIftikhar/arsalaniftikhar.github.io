name: PR Site Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check (lightweight, internal/offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --base . "**/*.html"
